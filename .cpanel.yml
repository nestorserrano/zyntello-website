---
# DEPLOY: zyntello-website
# ─────────────────────────────────────────────────────────────────────
# ORIGEN:  directorio de trabajo del repo clonado por cPanel
#          (Git Version Control → ruta configurada en el repo)
#          ejemplo: /home4/ukrmeumy/repositories/zyntello-website/
#
# DESTINO: /home4/ukrmeumy/public_html/zyntello/
#          accesible como: zyntello.com
#
# Qué se copia:
#   dist/*           → /public_html/zyntello/           (build React/Vite)
#   app/.htaccess    → /public_html/zyntello/app/        (enrutador de apps SaaS)
#
# El app/.htaccess redirige app.zyntello.com/[slug] a [slug]/public/index.php
# ─────────────────────────────────────────────────────────────────────
deployment:
  tasks:
    - export DEPLOYPATH=/home4/ukrmeumy/public_html/zyntello/
    # Limpiar assets anteriores (no fatal si falla)
    - /bin/rm -rf ${DEPLOYPATH}assets || true
    # Copia el build de React/Vite al document root del sitio web
    - /bin/cp -r /home4/ukrmeumy/repositories/zyntello-website/dist/index.html $DEPLOYPATH
    - /bin/cp -r /home4/ukrmeumy/repositories/zyntello-website/dist/assets $DEPLOYPATH
    - /bin/cp -r /home4/ukrmeumy/repositories/zyntello-website/dist/logos $DEPLOYPATH
    # Crea carpeta app/ si no existe y copia el .htaccess enrutador de apps SaaS
    - /bin/mkdir -p ${DEPLOYPATH}app
    - /bin/cp /home4/ukrmeumy/repositories/zyntello-website/app/.htaccess ${DEPLOYPATH}app/.htaccess
    - chmod 644 ${DEPLOYPATH}app/.htaccess
    - chmod 755 ${DEPLOYPATH}app
