---
# DEPLOY: zyntello-website
# ─────────────────────────────────────────────────────────────────────
# ORIGEN:  directorio de trabajo del repo clonado por cPanel
#          (Git Version Control → ruta configurada en el repo)
#          ejemplo: /home4/ukrmeumy/repositories/zyntello-website/
#
# DESTINO: /home4/ukrmeumy/public_html/zyntello/
#          accesible como: zyntello.com
#
# Qué se copia:
#   dist/*           → /public_html/zyntello/           (build React/Vite)
#   app/.htaccess    → /public_html/zyntello/app/        (enrutador de apps SaaS)
#
# El app/.htaccess redirige app.zyntello.com/[slug] a [slug]/public/index.php
# ─────────────────────────────────────────────────────────────────────
---
deployment:
  tasks:
    - /bin/cp -rf /home4/ukrmeumy/repositories/zyntello-website/dist/. /home4/ukrmeumy/public_html/zyntello/
    - /bin/mkdir -p /home4/ukrmeumy/public_html/zyntello/app
    - /bin/cp -f /home4/ukrmeumy/repositories/zyntello-website/app/.htaccess /home4/ukrmeumy/public_html/zyntello/app/.htaccess

